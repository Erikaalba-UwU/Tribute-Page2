    <h2>What is Jose Rizal known for?</h2>
    <p>Jose Rizal is known for his writings and activism during 
        the Spanish colonial period in the Philippines. Rizal's 
        most notable contributions include his writings, which 
        advocated for political reforms and social change in the 
        Philippines.</p>
    <h3>His Novels and Longer Fiction</h3>
        <ul>
            <li><b> "Noli Me Tangere" (Touch Me Not)</b></li>
            <p>Rizal’s first novel, a realist autopsy of colonial 
                society whose publication in Europe ignited debate 
                from Manila to Madrid. Together with its sequel, it 
                anchored the Propaganda Movement’s case for reform. 
            </p>
            <li><b>"El Filibusterismo" (The Reign of Greed)</b></li>
            <p>The darker, tighter sequel that returns Crisóstomo
                 Ibarra in disguise and follows a revolt that curdles
                  into tragedy. </p> 
                </ul>
  
  <h4>Unfinished Third Novels</h4>
      <ul>
        <li><b>Makamisa</b></li>
        <p> a Tagalog satire discovered by historian Ambeth 
            Ocampo in 1987; Rizal later restarted in Spanish 
            but left the project incomplete.</p>
        </ul>
  <p id="last"><b><i>These novels awakened national 
    consciousness and inspired a sense of identity 
    and pride among Filipinos.</b></i></p>
